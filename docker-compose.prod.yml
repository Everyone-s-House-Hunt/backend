version: '3.8'

services:
  api:
    build:
      context: ./app
      dockerfile: Dockerfile.prod
    env_file:
      - .env
    restart: always
    networks:
      - house-hunt-network

  db:
    image: mysql:8.0
    env_file:
      - .env
    volumes:
      - ./mysql-data:/var/lib/mysql
    restart: always
    networks:
      - house-hunt-network

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      - api
    networks:
      - house-hunt-network

  certbot:
    image: certbot/certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

networks:
  house-hunt-network: