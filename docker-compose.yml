services:
  backend:
    env_file: .env
    build: ./app
    ports:
      - "8080:8080"
    volumes:
      - ./app:/app
    working_dir: /app
    environment:
      - GO_PORT=8080
    command: go run main.go

  db:
    image: mysql:latest
    env_file: .env
    ports:
      - "3636:3636"
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASS}
      - MYSQL_DATABASE=${DB_NAME}
      - MYSQL_USER=${DB_USER}
      - MYSQL_PASSWORD=${DB_PASS}