services:
  backend:
    build:
      context: ./app
      dockerfile: Dockerfile
    env_file: .env
    ports:
      - "8080:8080"
    volumes:
      - ./app:/app
    working_dir: /app
    environment:
      - GO_PORT=${GO_PORT}
    command: go run main.go
    depends_on:
      db:
        condition: service_healthy
    networks:
      - house-network
  db:
    image: mysql:8.0
    env_file: .env
    ports:
      - "3636:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASS}
      - MYSQL_DATABASE=${DB_NAME}
      - MYSQL_USER=${DB_USER}
      - MYSQL_PASSWORD=${DB_PASS}
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 5s
      timeout: 3s
      retries: 10

networks:
  house-network:
    external: true